<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dice Constructor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;display:flex;height:100vh;overflow:hidden}
#preview{flex:1;min-width:0;position:relative}
#renderCanvas{width:100%;height:100%;display:block;outline:none}
#sidebar{width:340px;background:#16213e;border-left:1px solid #0f3460;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
h1{font-size:1.1rem;font-weight:700;color:#e94560;letter-spacing:.04em;margin-bottom:4px}
.section{background:#1a1a2e;border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px}
.section-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#e94560;margin-bottom:2px}
.row{display:flex;align-items:center;gap:8px}
.row label{flex:0 0 90px;font-size:.78rem;color:#9fb7cb}
.row input[type=color]{width:36px;height:28px;border:1px solid #0f3460;border-radius:4px;background:none;cursor:pointer;padding:0}
.row input[type=text]{width:80px;background:#0f3460;border:1px solid #233a5c;border-radius:4px;color:#e0e0e0;font-size:.78rem;padding:3px 6px;font-family:monospace}
.row input[type=range]{flex:1;accent-color:#e94560}
.row .val{width:42px;text-align:right;font-size:.75rem;font-family:monospace;color:#7f8ca8}
.row select{flex:1;background:#0f3460;border:1px solid #233a5c;border-radius:4px;color:#e0e0e0;font-size:.78rem;padding:3px 6px}
.btn-row{display:flex;gap:8px;margin-top:4px}
.btn{flex:1;padding:8px 0;border:none;border-radius:6px;font-size:.8rem;font-weight:600;cursor:pointer;transition:filter .15s}
.btn:hover{filter:brightness(1.15)}
.btn-copy{background:#e94560;color:#fff}
.btn-reset{background:#233a5c;color:#9fb7cb}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#e94560;color:#fff;padding:8px 20px;border-radius:6px;font-size:.8rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="preview">
  <canvas id="renderCanvas"></canvas>
</div>

<div id="sidebar">
  <h1>DICE CONSTRUCTOR</h1>

  <div class="section">
    <div class="section-title">Colors</div>
    <div class="row">
      <label>Body</label>
      <input type="color" id="bodyColor" value="#f4f2ef">
      <input type="text" id="bodyHex" value="#f4f2ef">
    </div>
    <div class="row">
      <label>Pips</label>
      <input type="color" id="pipColor" value="#141414">
      <input type="text" id="pipHex" value="#141414">
    </div>
    <div class="row">
      <label>Specular</label>
      <input type="range" id="specular" min="0" max="1" step="0.01" value="0.15">
      <span class="val" id="specularVal">0.15</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Geometry</div>
    <div class="row">
      <label>Roundness</label>
      <input type="range" id="edgeR" min="0" max="0.24" step="0.01" value="0.13">
      <span class="val" id="edgeRVal">0.13</span>
    </div>
    <div class="row">
      <label>Pip Size</label>
      <input type="range" id="pipR" min="0.04" max="0.16" step="0.005" value="0.10">
      <span class="val" id="pipRVal">0.10</span>
    </div>
    <div class="row">
      <label>Notch Depth</label>
      <input type="range" id="notchD" min="0" max="0.20" step="0.01" value="0.12">
      <span class="val" id="notchDVal">0.12</span>
    </div>
    <div class="row">
      <label>Pip Shape</label>
      <select id="pipShape">
        <option value="circle">Circle</option>
        <option value="star5">Star (5pt)</option>
      </select>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Face Mark</div>
    <div class="row">
      <label>Shape</label>
      <select id="markShape">
        <option value="none">None</option>
        <option value="heart">Heart</option>
        <option value="star">Star</option>
      </select>
    </div>
    <div class="row" id="markFaceRow" style="display:none">
      <label>Face</label>
      <select id="markFace">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>
    </div>
    <div class="row" id="markColorRow" style="display:none">
      <label>Mark Color</label>
      <input type="color" id="markColor" value="#cc2244">
      <input type="text" id="markColorHex" value="#cc2244">
    </div>
    <div class="row" id="markBgRow" style="display:none">
      <label>Shield Color</label>
      <input type="color" id="markBg" value="#e8a0b0">
      <input type="text" id="markBgHex" value="#e8a0b0">
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-copy" id="btnCopy">Copy Config</button>
    <button class="btn btn-reset" id="btnReset">Reset Defaults</button>
  </div>
</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script src="../src/vendor/babylon.js"></script>
<script type="importmap">
{ "imports": { "cannon-es": "../src/vendor/cannon-es.js" } }
</script>
<script type="module">
import {
  createDiceVertexData, createPipsVertexData, createMarkTexture,
  FACE_LOCALS, EDGE_R, NOTCH_R, NOTCH_D, PIP_OFFSET
} from '../src/engine/dieFactory.js';

const BABYLON = window.BABYLON;

// ── Defaults ─────────────────────────────────────────────────────────────────
const DEFAULTS = {
  bodyColor: '#f4f2ef',
  pipColor:  '#141414',
  specular:  0.15,
  edgeR:     EDGE_R,
  pipR:      0.10,
  notchD:    NOTCH_D,
  pipShape:  'circle',
  markShape: 'none',
  markFace:  1,
  markColor: '#cc2244',
  markBg:    '#e8a0b0',
};

// ── DOM refs ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

const els = {
  bodyColor: $('bodyColor'), bodyHex: $('bodyHex'),
  pipColor:  $('pipColor'),  pipHex:  $('pipHex'),
  specular:  $('specular'),  specularVal: $('specularVal'),
  edgeR:     $('edgeR'),     edgeRVal: $('edgeRVal'),
  pipR:      $('pipR'),      pipRVal:  $('pipRVal'),
  notchD:    $('notchD'),    notchDVal: $('notchDVal'),
  pipShape:  $('pipShape'),
  markShape: $('markShape'), markFace: $('markFace'), markColor: $('markColor'),
  markColorHex: $('markColorHex'),
  markBg: $('markBg'), markBgHex: $('markBgHex'),
  markFaceRow: $('markFaceRow'), markColorRow: $('markColorRow'), markBgRow: $('markBgRow'),
};

// ── Scene setup ──────────────────────────────────────────────────────────────
const canvas = $('renderCanvas');
const engine = new BABYLON.Engine(canvas, true, { alpha: false }, true);
const scene  = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.10, 0.10, 0.18, 1);

const cam = new BABYLON.ArcRotateCamera('cam', -0.8, 0.9, 3.0, BABYLON.Vector3.Zero(), scene);
cam.attachControl(canvas, true);
cam.lowerRadiusLimit = 1.5;
cam.upperRadiusLimit = 6;
cam.wheelPrecision   = 50;
cam.panningSensibility = 0;

new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0, 1, 0), scene).intensity = 0.85;
const dir = new BABYLON.DirectionalLight('dir', new BABYLON.Vector3(-0.5, -1, 0.4), scene);
dir.intensity = 0.65;

// ── Materials ────────────────────────────────────────────────────────────────
const oMat = new BABYLON.StandardMaterial('oMat', scene);
oMat.diffuseColor  = BABYLON.Color3.FromHexString(DEFAULTS.bodyColor);
oMat.specularColor = new BABYLON.Color3(DEFAULTS.specular, DEFAULTS.specular, DEFAULTS.specular);

const pipMat = new BABYLON.StandardMaterial('pipMat', scene);
pipMat.diffuseColor = BABYLON.Color3.FromHexString(DEFAULTS.pipColor);
pipMat.zOffset = -2;

const backMat = new BABYLON.StandardMaterial('backMat', scene);
backMat.diffuseColor = new BABYLON.Color3(0.06, 0.06, 0.06);

// ── Meshes ───────────────────────────────────────────────────────────────────
let outerMesh, pipsMesh, backMesh, markPlane;

function rebuildGeometry() {
  const edgeR  = parseFloat(els.edgeR.value);
  const pipR   = parseFloat(els.pipR.value);
  const notchD = parseFloat(els.notchD.value);

  if (outerMesh) outerMesh.dispose();
  if (pipsMesh)  pipsMesh.dispose();
  if (backMesh)  backMesh.dispose();

  const outerVD = createDiceVertexData(edgeR, NOTCH_R, notchD, PIP_OFFSET);
  outerMesh = new BABYLON.Mesh('outer', scene);
  outerVD.applyToMesh(outerMesh);
  outerMesh.material = oMat;

  const pipsVD = createPipsVertexData(pipR, PIP_OFFSET, els.pipShape.value);
  pipsMesh = new BABYLON.Mesh('pips', scene);
  pipsVD.applyToMesh(pipsMesh);
  pipsMesh.material = pipMat;

  // Backing box must shrink with roundness so it stays inside the rounded corners
  const cornerR = (0.5 - edgeR) + edgeR / Math.sqrt(3);
  const backSize = Math.max(0.3, 2 * cornerR - 0.03);
  backMesh = BABYLON.MeshBuilder.CreateBox('back', { size: backSize }, scene);
  backMesh.material = backMat;

  rebuildMark();
}

function rebuildMark() {
  if (markPlane) {
    if (markPlane.material) markPlane.material.dispose();
    markPlane.dispose();
    markPlane = null;
  }

  const shape = els.markShape.value;
  if (shape === 'none') return;

  const faceVal  = parseInt(els.markFace.value);
  const markCol  = els.markColor.value;
  const bgCol    = els.markBg.value;
  const fl = FACE_LOCALS.find(f => f.val === faceVal);
  if (!fl) return;

  const mark = { shape: shape, color: markCol, bg: bgCol, face: faceVal };
  const tex = createMarkTexture(mark, 'ctorMarkTex', scene);
  if (!tex) return;

  markPlane = BABYLON.MeshBuilder.CreatePlane('markPlane',
    { size: 0.65, sideOrientation: BABYLON.Mesh.DOUBLESIDE }, scene);
  const mMat = new BABYLON.StandardMaterial('ctorMarkMat', scene);
  mMat.diffuseTexture  = tex;
  mMat.diffuseTexture.hasAlpha = true;
  mMat.useAlphaFromDiffuseTexture = true;
  mMat.specularColor   = oMat.specularColor.clone();
  mMat.zOffset = -4;
  markPlane.material = mMat;

  const off = 0.505;
  markPlane.position.set(fl.x * off, fl.y * off, fl.z * off);
  if (fl.y !== 0) {
    markPlane.rotation.x = fl.y > 0 ? -Math.PI / 2 : Math.PI / 2;
  } else if (fl.x !== 0) {
    markPlane.rotation.y = fl.x > 0 ? Math.PI / 2 : -Math.PI / 2;
  } else {
    markPlane.rotation.y = fl.z > 0 ? 0 : Math.PI;
  }
}

// ── Color sync helpers ───────────────────────────────────────────────────────
function isLightColor(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*0.299 + g*0.587 + b*0.114) > 128;
}

function updateBodyColor() {
  const hex = els.bodyColor.value;
  els.bodyHex.value = hex;
  oMat.diffuseColor = BABYLON.Color3.FromHexString(hex);
  if (els.markShape.value !== 'none') rebuildMark();
}

function updatePipColor() {
  const hex = els.pipColor.value;
  els.pipHex.value = hex;
  if (isLightColor(hex)) {
    pipMat.disableLighting = true;
    pipMat.emissiveColor = BABYLON.Color3.FromHexString(hex);
    pipMat.diffuseColor  = BABYLON.Color3.Black();
    pipMat.specularColor = BABYLON.Color3.Black();
  } else {
    pipMat.disableLighting = false;
    pipMat.emissiveColor = BABYLON.Color3.Black();
    pipMat.diffuseColor  = BABYLON.Color3.FromHexString(hex);
    pipMat.specularColor = BABYLON.Color3.Black();
  }
}

function updateSpecular() {
  const v = parseFloat(els.specular.value);
  els.specularVal.textContent = v.toFixed(2);
  oMat.specularColor = new BABYLON.Color3(v, v, v);
}

// ── Slider sync helpers ──────────────────────────────────────────────────────
function onSliderChange(slider, valEl, decimals = 2) {
  valEl.textContent = parseFloat(slider.value).toFixed(decimals);
  rebuildGeometry();
}

// ── Mark visibility ──────────────────────────────────────────────────────────
function updateMarkUI() {
  const show = els.markShape.value !== 'none';
  els.markFaceRow.style.display  = show ? 'flex' : 'none';
  els.markColorRow.style.display = show ? 'flex' : 'none';
  els.markBgRow.style.display    = show ? 'flex' : 'none';
  rebuildMark();
}

// ── Event bindings ───────────────────────────────────────────────────────────
els.bodyColor.addEventListener('input', updateBodyColor);
els.bodyHex.addEventListener('change', () => { els.bodyColor.value = els.bodyHex.value; updateBodyColor(); });

els.pipColor.addEventListener('input', updatePipColor);
els.pipHex.addEventListener('change', () => { els.pipColor.value = els.pipHex.value; updatePipColor(); });

els.specular.addEventListener('input', updateSpecular);

els.edgeR.addEventListener('input', () => onSliderChange(els.edgeR, els.edgeRVal));
els.pipR.addEventListener('input',  () => onSliderChange(els.pipR, els.pipRVal, 3));
els.notchD.addEventListener('input', () => onSliderChange(els.notchD, els.notchDVal));
els.pipShape.addEventListener('change', rebuildGeometry);

els.markShape.addEventListener('change', updateMarkUI);
els.markFace.addEventListener('change', rebuildMark);
els.markColor.addEventListener('input', () => { els.markColorHex.value = els.markColor.value; rebuildMark(); });
els.markColorHex.addEventListener('change', () => { els.markColor.value = els.markColorHex.value; rebuildMark(); });
els.markBg.addEventListener('input', () => { els.markBgHex.value = els.markBg.value; rebuildMark(); });
els.markBgHex.addEventListener('change', () => { els.markBg.value = els.markBgHex.value; rebuildMark(); });

// ── Copy Config ──────────────────────────────────────────────────────────────
$('btnCopy').addEventListener('click', () => {
  const cfg = {
    body:     els.bodyColor.value,
    pips:     els.pipColor.value,
    specular: parseFloat(els.specular.value),
    edgeR:    parseFloat(els.edgeR.value),
    pipR:     parseFloat(els.pipR.value),
    notchD:   parseFloat(els.notchD.value),
  };
  if (els.pipShape.value !== 'circle') cfg.pipShape = els.pipShape.value;
  if (els.markShape.value !== 'none') {
    cfg.marks = [{
      face:  parseInt(els.markFace.value),
      shape: els.markShape.value,
      color: els.markColor.value,
      bg:    els.markBg.value,
    }];
  }
  const text = JSON.stringify(cfg, null, 2);
  navigator.clipboard.writeText(text).then(() => {
    const t = $('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  });
});

// ── Reset Defaults ───────────────────────────────────────────────────────────
$('btnReset').addEventListener('click', () => {
  els.bodyColor.value = DEFAULTS.bodyColor; els.bodyHex.value = DEFAULTS.bodyColor;
  els.pipColor.value  = DEFAULTS.pipColor;  els.pipHex.value  = DEFAULTS.pipColor;
  els.specular.value  = DEFAULTS.specular;  els.specularVal.textContent = DEFAULTS.specular.toFixed(2);
  els.edgeR.value     = DEFAULTS.edgeR;     els.edgeRVal.textContent = DEFAULTS.edgeR.toFixed(2);
  els.pipR.value      = DEFAULTS.pipR;      els.pipRVal.textContent  = DEFAULTS.pipR.toFixed(3);
  els.notchD.value    = DEFAULTS.notchD;    els.notchDVal.textContent = DEFAULTS.notchD.toFixed(2);
  els.pipShape.value  = DEFAULTS.pipShape;
  els.markShape.value = DEFAULTS.markShape;
  els.markFace.value  = DEFAULTS.markFace;
  els.markColor.value = DEFAULTS.markColor; els.markColorHex.value = DEFAULTS.markColor;
  els.markBg.value    = DEFAULTS.markBg;    els.markBgHex.value    = DEFAULTS.markBg;

  updateBodyColor();
  updatePipColor();
  updateSpecular();
  updateMarkUI();
  rebuildGeometry();
});

// ── Init ─────────────────────────────────────────────────────────────────────
rebuildGeometry();

engine.runRenderLoop(() => scene.render());
window.addEventListener('resize', () => engine.resize());
</script>
</body>
</html>
