<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice-a-Lot</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{overflow:hidden;background:#0e0e12;font-family:"Segoe UI",system-ui,Arial,sans-serif;color:#ddd}

    :root{
      --ui-glass:rgba(10,10,18,.36);
      --ui-glass-strong:rgba(10,10,18,.48);
      --ui-blur:14px;
      --ui-border:rgba(255,255,255,.14);
      --ui-shadow:0 4px 28px rgba(0,0,0,.35);
      --ui-text-shadow:0 1px 3px rgba(0,0,0,.9);
      --battle-ui-top:max(52px,calc(env(safe-area-inset-top) + 40px));
    }

    /* ── Fullscreen 3D canvas ────────────────────────────────── */
    #renderCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;display:block;touch-action:none;outline:none}

    /* ── Sling SVG overlay ───────────────────────────────────── */
    .sling-viz{position:fixed;inset:0;width:100%;height:100%;z-index:6;pointer-events:none;visibility:hidden}
    .sling-viz .sling-seg{filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))}
    .sling-viz-pow{font-size:clamp(13px,2.8vw,18px);font-weight:800;font-family:"Segoe UI",system-ui,sans-serif;fill:#f1c40f;stroke:#0a0a12;stroke-width:3px;paint-order:stroke fill}

    /* ── Banner / Toast ──────────────────────────────────────── */
    .banner{
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.7);
      padding:14px 42px;border-radius:14px;font-size:1.6rem;font-weight:800;letter-spacing:.05em;
      z-index:999;pointer-events:none;white-space:nowrap;text-align:center;
      opacity:0;transition:opacity .25s ease,transform .25s ease;
      text-shadow:0 2px 8px rgba(0,0,0,.4);
    }
    .banner.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
    .banner.bust{background:#c0392b;color:#fff}
    .banner.bank{background:linear-gradient(135deg,#d4a017,#f0c040);color:#1a1a1a}
    .banner.hot-hand{background:linear-gradient(135deg,#e67e22,#f1c40f);color:#1a1a1a}
    .banner.result{background:#27ae60;color:#fff}
    .banner.reroll{background:linear-gradient(135deg,#8e44ad,#9b59b6);color:#fff}

    /* ── UI overlay: fullscreen, pointer-events passthrough ─── */
    .battle-scene{
      position:fixed;inset:0;z-index:1;pointer-events:none;display:none;
      padding-top:var(--battle-ui-top);
      padding-right:max(14px,env(safe-area-inset-right));
      padding-bottom:max(14px,env(safe-area-inset-bottom));
      padding-left:max(14px,env(safe-area-inset-left));
    }

    /* ── Side panels ─────────────────────────────────────────── */
    .side{display:flex;flex-direction:column;gap:14px;pointer-events:auto}
    .side-left{
      position:absolute;z-index:2;
      top:var(--battle-ui-top);
      left:max(14px,env(safe-area-inset-left));
      width:min(240px,calc(40vw - 24px));
    }
    .side-right{
      position:absolute;z-index:2;
      top:var(--battle-ui-top);
      right:max(14px,env(safe-area-inset-right));
      width:min(260px,calc(40vw - 24px));
      align-items:stretch;
      max-height:calc(100vh - var(--battle-ui-top) - max(14px,env(safe-area-inset-bottom)));
    }

    /* ── Damage fly-up + HP flash/shake ─────────────────────── */
    @keyframes dmgFly{0%{opacity:1;transform:translateY(0)}70%{opacity:.85;transform:translateY(-32px)}100%{opacity:0;transform:translateY(-52px)}}
    @keyframes hpFlash{0%{filter:brightness(1)}30%{filter:brightness(2.2)}100%{filter:brightness(1)}}
    @keyframes hpShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-3px)}40%{transform:translateX(3px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
    .damage-fly{
      position:absolute;left:50%;top:-6px;transform:translateX(-50%);
      font-size:1.95rem;font-weight:900;color:#ff4444;white-space:nowrap;pointer-events:none;
      text-shadow:0 1px 6px rgba(0,0,0,.7),0 0 12px rgba(255,0,0,.35);
      animation:dmgFly 1.5s ease-out forwards;z-index:10;
    }
    .hp-flash .hp-fill{animation:hpFlash .35s ease}
    .hp-shake{animation:hpShake .25s ease}

    /* ── HP Widget ───────────────────────────────────────────── */
    .hp-widget{display:flex;align-items:center;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4));position:relative}
    .hp-avatar{
      width:80px;height:80px;border-radius:50%;flex-shrink:0;z-index:1;
      background:var(--ui-glass-strong);backdrop-filter:blur(var(--ui-blur));-webkit-backdrop-filter:blur(var(--ui-blur));
      border:3px solid rgba(255,255,255,.18);box-shadow:0 2px 14px rgba(0,0,0,.55);
      display:flex;align-items:center;justify-content:center;
    }
    .hp-widget-player .hp-avatar{border-color:rgba(231,76,60,.45);background:radial-gradient(circle at 38% 36%,rgba(231,76,60,.22),rgba(12,12,18,.72))}
    .hp-widget-enemy  .hp-avatar{border-color:rgba(142,68,173,.45);background:radial-gradient(circle at 38% 36%,rgba(142,68,173,.22),rgba(12,12,18,.72))}
    .hp-avatar-letter{font-size:1.4rem;font-weight:800;color:rgba(255,255,255,.65);letter-spacing:-.02em;text-shadow:0 1px 4px rgba(0,0,0,.6)}
    .hp-bar-body{
      position:relative;flex:1;height:30px;
      background:rgba(12,12,18,.62);border:1.5px solid rgba(255,255,255,.1);overflow:hidden;
    }
    .hp-widget-player .hp-bar-body{border-radius:0 15px 15px 0;margin-left:6px}
    .hp-widget-enemy  .hp-bar-body{border-radius:15px 0 0 15px;margin-right:6px}
    .hp-bar-body .hp-fill{position:absolute;top:0;height:100%;border-radius:inherit;transition:width .6s ease}
    .hp-widget-player .hp-fill{left:0}
    .hp-widget-enemy  .hp-fill{right:0}
    .hp-fill-player{background:linear-gradient(90deg,#c0392b,#e74c3c)}
    .hp-fill-enemy{background:linear-gradient(270deg,#8e44ad,#9b59b6)}
    .hp-bar-text{
      position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;
      height:100%;padding:0 12px;text-shadow:0 1px 3px rgba(0,0,0,.9);
    }
    .hp-name{font-size:.68rem;font-weight:700;color:rgba(255,255,255,.78);text-transform:uppercase;letter-spacing:.05em}
    .hp-numbers{font-size:.74rem;font-weight:700;color:#eee;font-variant-numeric:tabular-nums}
    .hp-numbers small{font-size:.6rem;font-weight:600;color:rgba(255,255,255,.5)}

    /* ── Side turn indicators ────────────────────────────────── */
    .side-turn{
      font-size:.85rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
      text-shadow:0 1px 6px rgba(0,0,0,.7),0 0 20px currentColor;
      opacity:0;transition:opacity .35s ease;pointer-events:none;text-align:center;
    }
    .side-turn.active{opacity:1}
    .side-left .side-turn{color:#e74c3c}
    .side-right .side-turn{color:#9b59b6}

    /* ── Badge placeholder slots ─────────────────────────────── */
    .badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}
    .badge-slot{
      aspect-ratio:1/1;min-height:0;border-radius:10px;
      border:2px dashed rgba(255,255,255,.13);
      background:rgba(10,10,18,.32);
      backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    }

    /* ── Center HUD ──────────────────────────────────────────── */
    .center{
      position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;align-items:center;
      pointer-events:none;padding-top:8px;padding-bottom:4px;
    }

    /* ── Info bar (top center) ───────────────────────────────── */
    .info-bar{
      display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:auto;white-space:nowrap;
      background:var(--ui-glass);backdrop-filter:blur(var(--ui-blur));-webkit-backdrop-filter:blur(var(--ui-blur));
      border:1px solid var(--ui-border);border-top:none;border-radius:0 0 12px 12px;padding:4px 18px 6px;align-self:center;
      box-shadow:var(--ui-shadow);text-shadow:var(--ui-text-shadow);
    }
    .round-score-wrap{display:flex;align-items:baseline;gap:6px}
    .round-label{font-size:1.25rem;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em}
    .round-value{font-size:1.55rem;font-weight:800;color:#ffc91c;font-variant-numeric:tabular-nums}
    .selection-info{font-size:.75rem;color:#bbb;line-height:1.2;min-height:1em}
    .status-text{font-size:.72rem;color:#666;min-height:16px}

    /* ── Action Buttons (bottom center) ──────────────────────── */
    .actions{
      display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:auto;
      background:var(--ui-glass);backdrop-filter:blur(var(--ui-blur));-webkit-backdrop-filter:blur(var(--ui-blur));
      border:1px solid var(--ui-border);border-bottom:none;border-radius:14px 14px 0 0;
      padding:10px 22px max(10px,env(safe-area-inset-bottom));align-self:center;min-height:52px;
      box-shadow:var(--ui-shadow);text-shadow:var(--ui-text-shadow);
    }
    .primary-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
    .btn{
      padding:10px 28px;border:none;border-radius:10px;font-size:.95rem;font-weight:700;
      cursor:pointer;letter-spacing:.03em;transition:background .12s,opacity .12s,transform .1s;
    }
    .btn:active{transform:scale(.97)}
    .btn-roll{background:#e74c3c;color:#fff;min-width:160px}
    .btn-roll:hover{background:#ff5544}
    .btn-score{background:#27ae60;color:#fff;min-width:170px}
    .btn-score:hover{background:#2ecc71}
    .btn-bank{background:linear-gradient(135deg,#d4a017,#e8b820);color:#1a1a1a;min-width:170px}
    .btn-bank:hover{background:linear-gradient(135deg,#e8b820,#f0c040)}
    .btn-restart{background:#555;color:#eee;margin-top:4px}
    .btn-restart:hover{background:#666}

    /* ── History ──────────────────────────────────────────────── */
    .history-card{
      background:var(--ui-glass);backdrop-filter:blur(var(--ui-blur));-webkit-backdrop-filter:blur(var(--ui-blur));
      border:1px solid var(--ui-border);border-radius:12px;padding:14px;display:flex;flex-direction:column;
      min-height:120px;max-height:min(36vh,300px);flex:1;min-width:0;width:100%;
      box-shadow:var(--ui-shadow);text-shadow:var(--ui-text-shadow);
    }
    .history-title{font-size:.78rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
    .history-log{flex:1;overflow-y:auto;font-size:.8rem;color:#aaa;display:flex;flex-direction:column;gap:4px;min-height:0}

    /* ── Loadout button ─────────────────────────────────────── */
    .btn-loadout{
      width:100%;padding:10px 0;margin-top:8px;
      background:linear-gradient(135deg,#3a3a5c,#4a4a6a);color:#ccc;border:1px solid rgba(255,255,255,.12);
      border-radius:10px;font-size:.82rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
      cursor:pointer;transition:background .15s,border-color .15s;pointer-events:auto;
    }
    .btn-loadout:hover{background:linear-gradient(135deg,#4a4a6a,#5a5a7a);border-color:rgba(255,255,255,.22)}
    .btn-loadout-second{margin-top:4px}

    /* ── Loadout modal (viewport-scaled via clamp + em) ─────── */
    .lo-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1200;display:none}
    .lo-modal{
      position:fixed;left:24px;top:24px;right:24px;bottom:24px;z-index:1201;
      display:none;grid-template-rows:auto 1fr auto;gap:12px;
      background:#111318;border:1px solid rgba(255,255,255,.14);border-radius:18px;
      padding:18px 22px;overflow:hidden;
      font-size:clamp(1rem, 1.5vmin, 1.25rem);
    }
    .lo-head{display:flex;justify-content:flex-end;align-items:center}
    .lo-close-btn{background:#333;color:#ccc;padding:.3em .7em;font-size:1.1em;line-height:1;border-radius:8px}
    .lo-footer{display:flex;justify-content:center;gap:.75em}
    .lo-save-btn{
      padding:.75em 2.25em;border-radius:12px;border:1px solid rgba(239,193,74,.35);
      background:linear-gradient(180deg,#f3c95c,#d7a93c);color:#241a08;
      font-size:.95em;font-weight:800;cursor:pointer;
    }
    .lo-save-btn:hover{filter:brightness(1.08)}
    .lo-clear-btn{
      padding:.75em 2.25em;border-radius:12px;border:1px solid rgba(255,255,255,.15);
      background:linear-gradient(180deg,#555,#444);color:#ddd;
      font-size:.95em;font-weight:800;cursor:pointer;
    }
    .lo-clear-btn:hover{filter:brightness(1.15)}

    .lo-workbench{display:grid;grid-template-columns:1fr 1fr;gap:1em;min-height:0;overflow:hidden}
    .lo-column{display:flex;flex-direction:column;gap:.5em;min-height:0;overflow:hidden}
    .lo-col-label{font-size:1.1em;font-weight:800;color:#ddd;text-transform:uppercase;letter-spacing:.1em}

    .lo-pool{
      flex:1;overflow-y:auto;
      display:grid;grid-template-columns:repeat(auto-fill,minmax(5.6em,1fr));gap:.5em;align-content:start;
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:.75em;
    }
    .lo-empty-msg{grid-column:1/-1;text-align:center;color:#555;font-size:.85em;padding:2em 0}

    .lo-rules{display:block!important;font-size:.84em;line-height:1.4;color:rgba(255,255,255,.72);padding:.9em 1.2em}
    .lo-rules h3{font-size:1.07em;font-weight:700;color:rgba(255,255,255,.92);margin:.75em 0 .2em;text-transform:uppercase;letter-spacing:.04em}
    .lo-rules h3:first-child{margin-top:0}
    .lo-rules p{margin:0 0 .35em}
    .lo-rules table{width:100%;border-collapse:collapse;margin:.3em 0 .6em}
    .lo-rules th,.lo-rules td{text-align:left;padding:.22em .45em;border-bottom:1px solid rgba(255,255,255,.06)}
    .lo-rules th{font-size:.86em;color:rgba(255,255,255,.45);font-weight:600;text-transform:uppercase}
    .lo-rules td{font-size:.98em;color:rgba(255,255,255,.68)}
    .lo-rules td:last-child{text-align:right;font-weight:700;color:#efc14a}
    .lo-rules .combo-dice{display:inline-flex;gap:.22em;vertical-align:middle}
    .lo-rules .combo-dice .lo-die-face{width:1.85em;height:1.85em;padding:.15em;border-radius:4px}
    .lo-rules .combo-dice .lo-die-face .lo-pip{width:.3em;height:.3em}

    .lo-slot-strip{
      display:grid;grid-template-columns:repeat(6,1fr);gap:.6em;
      padding:.5em 0;
    }
    .lo-slot{
      display:flex;flex-direction:column;align-items:center;gap:.4em;cursor:pointer;
      padding:.4em;border-radius:16px;border:2px solid transparent;transition:.15s;
    }
    .lo-slot:hover{border-color:rgba(255,255,255,.12)}
    .lo-slot.selected{border-color:rgba(239,193,74,.6);background:rgba(239,193,74,.06)}
    .lo-slot-well{
      width:100%;aspect-ratio:1/1;border-radius:22px;border:2px dashed rgba(255,255,255,.15);
      display:flex;align-items:center;justify-content:center;background:#0d1017;transition:.15s;
    }
    .lo-slot.filled .lo-slot-well{border-style:solid;border-color:rgba(255,255,255,.08);background:#181c24}

    .lo-die-face{
      width:80%;height:80%;background:#f4f2ef;border-radius:20%;
      display:grid;grid-template:repeat(3,1fr)/repeat(3,1fr);padding:12%;
      box-shadow:0 2px 8px rgba(0,0,0,.4);
    }
    .lo-die-face .lo-pip{
      width:55%;height:55%;border-radius:50%;background:#1a1a1a;
      align-self:center;justify-self:center;
    }
    .lo-die-face .lo-pip-hide{visibility:hidden}
    .lo-detail-3d-wrap{display:flex;justify-content:center}
    .lo-detail-3d{
      width:100%;max-width:17em;aspect-ratio:1/1;border-radius:12px;
      background:rgba(255,255,255,.03);display:block;cursor:grab;touch-action:none;
    }
    .lo-detail-3d:active{cursor:grabbing}
    .lo-detail-hint{
      font-size:.65em;color:#555;text-align:center;margin-top:-.25em;letter-spacing:.05em;
      opacity:1;transition:opacity .45s ease;
    }
    .lo-hint-hidden{opacity:0}
    .lo-slot-name{font-size:.7em;font-weight:700;color:#8f9cba;text-align:center;line-height:1.2}

    .lo-tile{
      display:flex;flex-direction:column;align-items:center;gap:.32em;cursor:pointer;
      padding:.5em .25em;border-radius:12px;border:2px solid transparent;transition:.15s;
    }
    .lo-tile:hover{border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.04)}
    .lo-tile.selected{border-color:rgba(120,182,255,.5);background:rgba(120,182,255,.08)}
    .lo-tile-icon{width:3em;height:3em;border-radius:12px}
    .lo-tile-label{font-size:.7em;font-weight:600;color:#999;text-align:center;line-height:1.2}

    .lo-detail-wrap{
      flex:1;overflow-y:auto;
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:1em;
    }
    .lo-detail-placeholder{color:#555;font-size:.85em;text-align:center;padding:1.75em 0}
    .lo-detail-card{display:flex;flex-direction:column;align-items:center;gap:.75em}
    .lo-detail-icon-wrap{display:flex;justify-content:center}
    .lo-detail-icon{width:4.5em;height:4.5em;border-radius:18px}
    .lo-detail-name{font-size:1.3em;font-weight:800;color:#f4f7ff}
    .lo-detail-rarity{font-size:.72em;font-weight:700;letter-spacing:.1em}
    .lo-detail-desc{font-size:.82em;color:rgba(255,255,255,.55);text-align:center;line-height:1.4;max-width:16em}
    .lo-rarity-common{color:#8bc34a}
    .lo-rarity-rare{color:#ab47bc}
    .lo-rarity-exotic{color:#ff7043}
    .lo-rarity-base{color:#999}
    .lo-detail-ability{font-size:.8em;color:#9fb7cb}
    .lo-action-btn{
      margin-top:.5em;padding:.62em 1.5em;border:none;border-radius:10px;
      font-size:.85em;font-weight:700;cursor:pointer;transition:.12s;
    }
    .lo-place-btn{background:#27ae60;color:#fff}
    .lo-place-btn:hover{background:#2ecc71}
    .lo-remove-btn{background:#c0392b;color:#fff}
    .lo-remove-btn:hover{background:#e74c3c}

    @media(max-width:700px){
      .lo-modal{left:8px;top:8px;right:8px;bottom:8px;padding:14px;font-size:clamp(13px,2.5vw,1rem)}
      .lo-workbench{grid-template-columns:1fr;grid-template-rows:auto 1fr}
      .lo-slot-strip{grid-template-columns:repeat(3,1fr)}
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media(max-width:700px){
      .side-left{width:min(200px,calc(50vw - 16px))}
      .side-right{width:min(200px,calc(50vw - 16px))}
      .history-card{max-height:min(32vh,220px)}
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <!-- Sling visualization (SVG overlay) -->
  <svg id="slingVizSvg" class="sling-viz" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <g id="slingWedgeSegs" fill="#f1c40f" fill-opacity="0.93" stroke="#d4ac0d" stroke-width="0.75" stroke-opacity="0.55">
      <path id="slingSeg0" class="sling-seg" d=""/>
      <path id="slingSeg1" class="sling-seg" d=""/>
      <path id="slingSeg2" class="sling-seg" d=""/>
      <path id="slingSeg3" class="sling-seg" d=""/>
    </g>
    <circle id="slingVizAnchor" cx="0" cy="0" r="8" fill="rgba(241,196,15,.25)" stroke="#f1c40f" stroke-width="2"/>
    <text id="slingVizPow" class="sling-viz-pow" x="0" y="0" text-anchor="middle" style="display:none">0%</text>
  </svg>

  <!-- Banner -->
  <div id="banner" class="banner"><span id="bannerText"></span></div>

  <!-- Battle UI overlay -->
  <div class="battle-scene" id="battleUI">
    <!-- Left: Player HP -->
    <aside class="side side-left">
      <div class="side-turn" id="playerTurnLabel">Player Turn</div>
      <div class="hp-widget hp-widget-player">
        <div class="hp-avatar"><span class="hp-avatar-letter">P</span></div>
        <div class="hp-bar-body">
          <div class="hp-fill hp-fill-player" id="playerHpFill" style="width:100%"></div>
          <div class="hp-bar-text">
            <span class="hp-name" id="playerName">Player</span>
            <span class="hp-numbers"><span id="playerHp">0</span><small> / <span id="playerHpMax">0</span></small></span>
          </div>
        </div>
      </div>
      <div class="badge-grid">
        <div class="badge-slot"></div>
        <div class="badge-slot"></div>
        <div class="badge-slot"></div>
      </div>
      <button id="rulesBtn" class="btn btn-loadout">RULES &amp; DICES</button>
      <button id="loadoutBtn" class="btn btn-loadout btn-loadout-second">LOADOUT</button>
    </aside>

    <!-- Center: info + buttons -->
    <main class="center">
      <div class="info-bar">
        <div class="round-score-wrap">
          <span class="round-label">Round Score</span>
          <span class="round-value" id="accScore">0</span>
        </div>
        <div class="selection-info" id="selScore">&nbsp;</div>
        <div class="status-text" id="phaseHint"></div>
      </div>

      <div class="actions" id="actionsWrap">
        <div class="primary-row">
          <button id="btnRoll" class="btn btn-roll" style="display:none">ROLL</button>
          <button id="btnScore" class="btn btn-score" style="display:none">SCORE'N'PLAY</button>
          <button id="btnBank" class="btn btn-bank" style="display:none">BANK'N'PASS</button>
          <button id="newBattleBtn" class="btn btn-restart" style="display:none">PLAY AGAIN</button>
        </div>
      </div>
    </main>

    <!-- Right: Enemy HP + History -->
    <aside class="side side-right">
      <div class="side-turn" id="botTurnLabel">Bot Turn</div>

        </div>
        <div class="hp-avatar"><span class="hp-avatar-letter">B</span></div>
      </div>
      <div class="badge-grid">
        <div class="badge-slot"></div>
        <div class="badge-slot"></div>
        <div class="badge-slot"></div>
      </div>
      <div class="history-card">
        <div class="history-title">Round History</div>
        <div class="history-log" id="historyLog"></div>
      </div>
    </aside>
  </div>

  <!-- Loadout modal -->
  <div id="loadoutBackdrop" class="lo-backdrop"></div>
  <div id="loadoutModal" class="lo-modal">
    <div class="lo-head">
      <button id="closeLoadoutBtn" class="btn lo-close-btn">&times;</button>
    </div>
    <div class="lo-workbench">
      <div class="lo-column lo-col-inv">

      </div>
      <div class="lo-column lo-col-right">

        <div class="lo-slot-strip" id="loadoutSlots"></div>
        <div class="lo-detail-wrap" id="loadoutDetail"></div>
      </div>
    </div>
    <div class="lo-footer">
      <button id="saveLoadoutBtn" class="btn lo-save-btn">Save Loadout</button>
      <button id="clearLoadoutBtn" class="btn lo-clear-btn">Clear Loadout</button>
    </div>
  </div>
