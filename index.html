<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice-a-Lot</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, "Segoe UI", sans-serif;
      background: #0a0a0f;
      color: #ccc;
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      line-height: 1.5;
    }
    code, .mono { font-family: Consolas, "Cascadia Mono", monospace; background: #1a1a22; padding: 2px 8px; border-radius: 6px; font-size: 0.9em; }
    a { color: #ffc91c; }
    h1 { color: #eee; font-size: 1.25rem; margin-top: 0; }
    .box { max-width: 520px; margin: 0 auto; background: rgba(20,20,28,.95); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 20px; }
    .muted { color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div id="root" class="box">
    <h1>Dice-a-Lot</h1>
    <p id="msg">Переход к игре…</p>
    <p class="muted"><a href="./battle.html">Открыть battle.html</a> · <a href="./throw-lab.html">Throw lab</a> (только броски + тюнинг)</p>
  </div>
  <script>
    (function () {
      var root = document.getElementById('root');
      var msg = document.getElementById('msg');
      if (location.protocol === 'file:') {
        msg.innerHTML =
          'С диска (<span class="mono">file://</span>) игра <strong>не запустится</strong>: браузер блокирует ES-модули и physics для <code>battle.html</code>.<br><br>' +
          '<strong>Сделай так:</strong><ol style="margin:8px 0;padding-left:1.2rem">' +
          '<li>Открой терминал в папке <span class="mono">dice-a-lot</span></li>' +
          '<li>Выполни: <span class="mono">node server.mjs</span></li>' +
          '<li>В браузере открой <a href="http://127.0.0.1:4174/">http://127.0.0.1:4174/</a> — там откроется этот же index и перекинет в игру.</li>' +
          '</ol>' +
          '<p class="muted">На GitHub Pages (https) всё работает без сервера у себя на машине.</p>';
        return;
      }
      location.replace(new URL('./battle.html', location.href).href);
    })();
  </script>
</body>
</html>
